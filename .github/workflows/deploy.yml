name: Deploy

# Pipeline:
#   test            → mvn verify on JDK 25
#   build-and-push  → linux/arm64 image on a native ARM runner, push to GHCR
#   deploy          → ssh to OCI VM, docker compose pull && up -d, smoke check
#
# Frontend is on Cloudflare Workers Static Assets and auto-deploys from the
# same push; nothing here drives that side.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vandana-ajay-wedding-website

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: mvn verify
        run: mvn -B verify --no-transfer-progress

  build-and-push:
    name: Build + push image
    needs: test
    # Native arm64 runner — free for public repos. Builds the JAR + image
    # in ~1m vs ~6m under QEMU. If the repo goes private later, swap to
    # ubuntu-latest and add docker/setup-qemu-action@v3.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to OCI VM
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: SSH and roll the stack
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ~/app

            echo "Logging into GHCR…"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "Pulling new image (tag: $IMAGE_TAG)…"
            docker compose pull app

            echo "Rolling app container…"
            docker compose up -d app

            docker image prune -f
            docker logout ghcr.io >/dev/null

            echo "Smoke check (internal):"
            sleep 4
            docker compose exec -T app sh -c \
              "wget -qO- http://localhost:8080/api/wedding/events | head -c 200" && echo
            echo "Deploy complete."
